# Copy this file to AppData/Roaming/tabby/config.yaml and edit it to customize
# Tabby. Please notice that this file is overwritten when Tabby updates, so you
# should not edit it directly. Also keep in mind that as Tabby does not expand
# environment variables in this file, you should use absolute paths (so the
# paths provided here will be broken in your system).

version: 8

profiles:
  - type: local
    name: Kompanion
    options:
      command: powershell.exe
      args:
        - '-NoExit'
        - '-File'
        - D:\kompanion\kompanion.ps1
      env:
        WT_SESSION: 0
      cwd: D:\kompanion\repos
    id: local:custom:Kompanion:ee9c114b-1d83-4a7c-9be3-a121ae20ccec

terminal:
  searchOptions: {}
  colorScheme:
    name: VibrantInk
    foreground: '#ffffff'
    background: '#000000'
    cursor: '#ffffff'
    colors:
      - '#878787'
      - '#ff6600'
      - '#ccff04'
      - '#ffcc00'
      - '#44b4cc'
      - '#9933cc'
      - '#44b4cc'
      - '#f5f5f5'
      - '#555555'
      - '#ff0000'
      - '#00ff00'
      - '#ffff00'
      - '#0000ff'
      - '#ff00ff'
      - '#00ffff'
      - '#e5e5e5'
  customColorSchemes: []
