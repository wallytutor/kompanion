% ------------- DIRECT, ADJOINT, AND LINEARIZED PROBLEM DEFINITION ------------%

SOLVER= INC_NAVIER_STOKES
INC_ENERGY_EQUATION= YES

% ------------------- INCOMPRESSIBLE FREE-STREAM DEFINITION -------------------%

FREESTREAM_TEMPERATURE= 300

INC_VELOCITY_INIT= (0.0, 0.0, 0.0)
FLUID_MODEL= INC_IDEAL_GAS

VISCOSITY_MODEL= CONSTANT_VISCOSITY
MU_CONSTANT= 1e-5

REF_DIMENSIONALIZATION= DIMENSIONAL
INC_NONDIM= DIMENSIONAL

% -------------------- BOUNDARY CONDITION DEFINITION --------------------------%

INC_INLET_TYPE  = VELOCITY_INLET
INC_OUTLET_TYPE = PRESSURE_OUTLET

MARKER_INTERNAL = ( fluid )
MARKER_INLET    = ( fluid_inlet, 300, 0.0, 1.0, 0.0, 0.0 )
MARKER_OUTLET   = ( fluid_outlet, 0.0)
MARKER_SYM      = ( fluid_sym_main, fluid_sym_slice )

% ------------- COMMON PARAMETERS DEFINING THE NUMERICAL METHOD ---------------%

CFL_NUMBER= 100

% -------------------- FLOW NUMERICAL METHOD DEFINITION -----------------------%

CONV_NUM_METHOD_FLOW= FDS
MUSCL_FLOW= YES

% --------------------------- CONVERGENCE PARAMETERS --------------------------%

CONV_RESIDUAL_MINVAL= -12

% ------------------------- INPUT/OUTPUT INFORMATION --------------------------%

TABULAR_FORMAT= CSV
CONV_FILENAME= results/history_fluid
MESH_FILENAME= ../geometry/honeycomb_1_12.su2