SOLVER                = MULTIPHYSICS
MATH_PROBLEM          = DIRECT
MULTIZONE_MESH        = NO
CONFIG_LIST           = ( solid.cfg, fluid.cfg )
MARKER_ZONE_INTERFACE = ( cht_solid_fluid, cht_fluid_solid )
MARKER_CHT_INTERFACE  = ( cht_solid_fluid, cht_fluid_solid )

%CHT_INTERFACE_CONTACT_RESISTANCE = ( 0 )
%CHT_COUPLING_METHOD = DIRECT_TEMPERATURE_ROBIN_HEATFLUX

% ---------------------------------------------------------------------
% TRANSIENT SIMULATION PARAMETERS
% ---------------------------------------------------------------------

% Activate unsteady simulation:
TIME_DOMAIN= YES

% Time marching method:
TIME_MARCHING= DUAL_TIME_STEPPING-2ND_ORDER

% Physical time step [s]
TIME_STEP= 0.05

% Physical time to simulate [s]:
MAX_TIME= 60.0

% Number of total outer iterations (iterations per time)
OUTER_ITER = 20

% (MAX_TIME / TIME_STEP) * OUTER_ITER = 24000
TIME_ITER= 24000

% Time iteration to start the windowed time average in a direct run
WINDOW_START_ITER = 500

% ---------------------------------------------------------------------
% RESULTS AND OUTPUT PARAMETERS
% ---------------------------------------------------------------------

VOLUME_FILENAME = results/volume
WRT_ZONE_HIST   = YES
OUTPUT_WRT_FREQ = ( 10 )
OUTPUT_FILES    = ( PARAVIEW_MULTIBLOCK )
SCREEN_OUTPUT   = OUTER_ITER, RMS_RES[0], RMS_RES[1], RMS_RES[2]